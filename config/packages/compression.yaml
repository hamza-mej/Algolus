# HTTP Compression Configuration
# Enables GZIP compression for better performance
# Note: Compression is typically handled at the web server level (Nginx/Apache)

# For Nginx, add to server block:
#     gzip on;
#     gzip_vary on;
#     gzip_proxied any;
#     gzip_comp_level 6;
#     gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
#
# For Apache, use mod_deflate:
#     <IfModule mod_deflate.c>
#         AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
#     </IfModule>
